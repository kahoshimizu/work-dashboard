<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>作業レポートダッシュボード</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a;padding:16px}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
h1{font-size:18px;font-weight:500}
.header-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.meta{font-size:12px;color:#999}
.tabs{display:flex;gap:4px;border-bottom:1px solid #ddd;margin-bottom:4px}
.tab{padding:8px 16px;border:none;background:transparent;cursor:pointer;font-size:14px;color:#666;border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.active{color:#1a1a1a;font-weight:500;border-bottom-color:#1a1a1a}
.period-label{font-size:12px;color:#999;margin-bottom:14px}
.summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.summary-col{background:#fff;border-radius:10px;border:1px solid #eee;padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.summary-col-title{font-size:11px;color:#aaa;font-weight:500;letter-spacing:0.03em;margin-bottom:2px}
.summary-item{}
.summary-label{font-size:11px;color:#888;margin-bottom:2px}
.summary-value{font-size:18px;font-weight:500;color:#1a1a1a}
.section-title{font-size:15px;font-weight:500;margin:18px 0 8px}
.filter-bar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;background:#fff;border:1px solid #eee;border-radius:8px;padding:8px 12px}
.filter-bar label{display:flex;align-items:center;gap:4px;font-size:12px;color:#555;cursor:pointer;user-select:none}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;margin-bottom:8px}
.box{background:#fff;border-radius:12px;padding:14px 18px;border:1px solid #eee}
.box-title{font-size:13px;font-weight:500;margin-bottom:10px;color:#444}
.bar-wrap{position:relative}
.bar-row{display:flex;align-items:center;gap:8px;font-size:13px;margin-bottom:6px;touch-action:pan-y}
.bar-label{width:86px;text-align:right;color:#666;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px}
.bar-track{flex:1;background:#f0f0f0;border-radius:4px;height:16px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px}
.bar-btn{border:none;background:transparent;cursor:pointer;font-size:11px;font-weight:500;color:#1a1a1a;padding:2px 5px;border-radius:4px;white-space:nowrap;min-width:80px;text-align:left}
.bar-btn:hover{background:#f0f0f0}
.swipe-hint{font-size:10px;color:#bbb;text-align:right;margin-bottom:6px}
.detail-box{background:#f9f9f9;border:1px solid #eee;border-radius:8px;padding:8px 12px;margin:2px 0 8px 94px;font-size:11px}
.detail-row{display:flex;justify-content:space-between;padding:2px 0;color:#555;gap:8px}
.detail-row span:first-child{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.move-overlay{display:none;position:absolute;top:0;left:94px;right:0;background:rgba(255,255,255,0.96);border:1px solid #ddd;border-radius:8px;padding:8px;z-index:10;flex-wrap:wrap;gap:6px}
.move-overlay.show{display:flex}
.move-btn{font-size:11px;padding:3px 10px;border-radius:12px;border:1px solid #ddd;background:#fff;cursor:pointer;white-space:nowrap}
.move-btn:hover{background:#f0f0f0}
.legend{display:flex;flex-direction:column;gap:5px;font-size:12px}
.legend-item{display:flex;align-items:center;gap:6px}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.location-box{background:#fff;border-radius:12px;padding:14px 18px;border:1px solid #eee;margin-bottom:8px}
.location-title{font-size:13px;font-weight:500;margin-bottom:12px;color:#444}
.loc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:12px}
.loc-card{background:#f9f9f9;border-radius:8px;padding:8px 10px;text-align:center;border:1px solid #eee}
.loc-card-label{font-size:11px;color:#888;margin-bottom:3px}
.loc-card-value{font-size:16px;font-weight:500}
.loc-card-sub{font-size:11px;color:#aaa}
.loc-bar-row{display:flex;align-items:center;gap:8px;font-size:12px;margin-bottom:6px}
.loc-bar-label{width:72px;text-align:right;color:#666;flex-shrink:0}
.loc-bar-track{flex:1;background:#f0f0f0;border-radius:4px;height:14px;overflow:hidden}
.loc-bar-fill{height:100%;border-radius:4px}
.loc-bar-val{font-size:11px;color:#444;min-width:60px}
.ai-box{background:#f9f9f9;border-radius:12px;padding:14px 18px;border:1px solid #eee;margin-top:14px}
.ai-title{font-size:14px;font-weight:500;margin-bottom:6px}
.ai-text{font-size:13px;color:#555;line-height:1.7}
.copy-hint{font-size:11px;color:#888;margin-top:6px}
button{background:#fff;border:1px solid #ddd;border-radius:6px;padding:5px 12px;cursor:pointer;font-size:13px}
button:hover{background:#f5f5f5}
.loading{text-align:center;padding:48px;color:#888;font-size:14px}
.error{background:#fff0f0;border:1px solid #fcc;color:#c33;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px}
.empty{font-size:13px;color:#aaa;text-align:center;padding:14px 0}
</style>
</head>
<body>
<div id="app"><div class="loading">読み込み中…</div></div>
<script>
const CLIENT_ID="729656531255-stonbhee0o8m10gfbqckf1bp2fump90g.apps.googleusercontent.com";
const SCOPES="https://www.googleapis.com/auth/calendar.readonly";
const COLORS={"PJ":"#378ADD","イベント":"#1D9E75","新卒 1on1":"#D4537E","UM 1on1":"#D85A30","PMP":"#7F77DD","未分類":"#888780","foobar*":"#3B6D11"};
const LOC_COLORS={"オフィス":"#378ADD","自宅":"#1D9E75","その他":"#888780"};
const ALL_CATS=["PJ","イベント","新卒 1on1","UM 1on1","PMP","foobar*","未分類"];
const DAYS=["日","月","火","水","木","金","土"];

const RULES=[
  {m:t=>/JMB/i.test(t)||/^タスク確認/.test(t)||/JAL/i.test(t)||/SSNB/i.test(t)||/定例/.test(t)||/リリース/.test(t)||/Liquid/i.test(t)||/サーバ/.test(t),c:"PJ"},
  {m:t=>/Monthly Mixer/i.test(t)||/CTOs Beer/i.test(t)||/Designer.*s Creative Circle/i.test(t)||/イベント/.test(t)||/Circle/i.test(t),c:"イベント"},
  {m:t=>/foobar/i.test(t)||/foobar\*/i.test(t)||/MM/.test(t)||/DCC/.test(t)||/KAITEKI/i.test(t)||/カクヤス/.test(t),c:"foobar*"},
  {m:t=>/^Kaho \/ Miu/.test(t)||/^Kaho \/ Emiri/.test(t)||/^Emiri \/ Kaho/.test(t)||/^Miu \/ Kaho/.test(t)||/^Miu\/Kaho/.test(t),c:"新卒 1on1"},
  {m:t=>/^Masanori \/ Kaho/.test(t)||/^Satoshi \/ Kaho/.test(t)||/^\[上期評価FB\]/.test(t),c:"UM 1on1"},
  {m:t=>/\[FY26\]PMP1[：:].*定例/.test(t)||/General MTG for PMPs/.test(t),c:"PMP"},
];

// colorId: 4=Flamingo, 8=Graphite → 除外
function isExcludedColor(ev){return ev.colorId==="4"||ev.colorId==="8";}

let period="week",tokenClient,gapiDone=false,gisDone=false;
let calData=[],taskData=[],locData={},updatedAt="";
let openDetails={ev:{},tk:{},all:{}};
let filters={all:{},ev:{},tk:{}};
let overrides={ev:{},tk:{}};
let swipeStartX=0,swipeStartY=0;

function categorize(t){for(const r of RULES)if(r.m(t))return r.c;return"未分類";}
function fmtH(h){return h<0.05?"0h":h.toFixed(1)+"h";}
function fmtDate(d){return`${d.getMonth()+1}/${d.getDate()}(${DAYS[d.getDay()]})`;}

function getRange(p){
  const now=new Date();
  if(p==="day"){const s=new Date(now);s.setHours(0,0,0,0);const e=new Date(now);e.setHours(23,59,59,999);return{start:s,end:e};}
  if(p==="week"){const s=new Date(now);s.setDate(now.getDate()-6);s.setHours(0,0,0,0);const e=new Date(now);e.setHours(23,59,59,999);return{start:s,end:e};}
  const s=new Date(now);s.setDate(now.getDate()-29);s.setHours(0,0,0,0);const e=new Date(now);e.setHours(23,59,59,999);return{start:s,end:e};
}
function getPeriodLabel(p){
  const{start,end}=getRange(p);
  if(p==="day")return fmtDate(start);
  return`${fmtDate(start)}〜${fmtDate(end)}`;
}

function tryReady(){
  if(!gapiDone||!gisDone)return;
  document.getElementById("app").innerHTML=`<div class="loading"><div style="font-size:15px;font-weight:500;margin-bottom:8px">作業レポートダッシュボード</div><div style="font-size:13px;color:#888;margin-bottom:20px">Googleアカウントでログインしてください</div><button onclick="signIn()" style="font-size:14px;padding:10px 28px;font-weight:500;background:#1a73e8;color:#fff;border:none;border-radius:8px;cursor:pointer">Googleでログイン</button></div>`;
}
function gapiInit(){gapi.load("client",async()=>{await gapi.client.load("https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest");gapiDone=true;tryReady();});}
function gisInit(){tokenClient=google.accounts.oauth2.initTokenClient({client_id:CLIENT_ID,scope:SCOPES,callback:(resp)=>{if(resp.error){showError("認証エラー: "+resp.error);return;}fetchData();}});gisDone=true;tryReady();}
function signIn(){tokenClient.requestAccessToken({prompt:"consent"});}
function signOut(){const t=gapi.client.getToken();if(t)google.accounts.oauth2.revoke(t.access_token,()=>{});gapi.client.setToken(null);calData=[];taskData=[];locData={};document.getElementById("app").innerHTML=`<div class="loading"><div style="margin-bottom:12px">ログアウトしました</div><button onclick="signIn()" style="font-size:14px;padding:10px 28px;background:#1a73e8;color:#fff;border:none;border-radius:8px;cursor:pointer">再ログイン</button></div>`;}
function showError(msg){let el=document.getElementById("err");if(!el){el=document.createElement("div");el.id="err";el.className="error";document.getElementById("app").prepend(el);}el.textContent=msg;}

// 勤務場所判定
function detectLocation(ev){
  const loc=(ev.location||"").toLowerCase();
  const title=(ev.summary||"").toLowerCase();
  const desc=(ev.description||"").toLowerCase();
  const all=loc+" "+title+" "+desc;
  if(/オフィス|office|大手町|出社|会社/.test(all))return"オフィス";
  if(/自宅|home|リモート|remote|wfh/.test(all))return"自宅";
  if(ev.location&&ev.location.trim())return"その他";
  return null;
}

async function fetchData(){
  try{
    const{start,end}=getRange(period);
    const calRes=await gapi.client.calendar.events.list({calendarId:"primary",timeMin:start.toISOString(),timeMax:end.toISOString(),singleEvents:true,orderBy:"startTime",maxResults:500});
    const items=calRes.result.items||[];
    let myEmail="";
    try{myEmail=(await gapi.client.calendar.calendarList.get({calendarId:"primary"})).result.id;}catch(e){}

    const catMap={},taskMap={};
    // 勤務場所：日付ごとに記録
    const locDays={オフィス:new Set(),自宅:new Set(),その他:new Set()};

    items.forEach(ev=>{
      if(isExcludedColor(ev))return;
      if(ev.start?.date&&!ev.start?.dateTime)return;
      if(!ev.start?.dateTime||!ev.end?.dateTime)return;
      const dur=(new Date(ev.end.dateTime)-new Date(ev.start.dateTime))/3600000;
      if(dur<=0)return;
      const title=ev.summary||"",desc=ev.description||"";
      const isTask=desc.includes("tasks.google.com/task/");
      if(!isTask&&(/^不在$/.test(title.trim())||/^移動$/.test(title.trim())))return;

      // 勤務場所カウント（タスク・予定問わず）
      const loc=detectLocation(ev);
      if(loc){
        const dateKey=ev.start.dateTime.slice(0,10);
        locDays[loc].add(dateKey);
      }

      if(isTask){
        const cat=categorize(title);
        if(!taskMap[cat])taskMap[cat]={value:0,count:0,items:[]};
        taskMap[cat].value+=dur;taskMap[cat].count++;taskMap[cat].items.push({title,dur});
        return;
      }
      if(ev.attendees&&ev.attendees.length>0){
        const me=ev.attendees.find(a=>a.self||(myEmail&&a.email===myEmail));
        if(me&&(me.responseStatus==="declined"||me.responseStatus==="tentative"||me.responseStatus==="needsAction"))return;
      }
      const cat=categorize(title);
      if(!catMap[cat])catMap[cat]={value:0,count:0,items:[]};
      catMap[cat].value+=dur;catMap[cat].count++;catMap[cat].items.push({title,dur});
    });

    calData=Object.entries(catMap).map(([label,d])=>({label,value:d.value,count:d.count,items:d.items})).sort((a,b)=>b.value-a.value);
    taskData=Object.entries(taskMap).map(([label,d])=>({label,value:d.value,count:d.count,items:d.items})).sort((a,b)=>b.value-a.value);

    const totalLocDays=new Set([...locDays.オフィス,...locDays.自宅,...locDays.その他]).size||1;
    locData={
      オフィス:{days:locDays.オフィス.size,pct:Math.round(locDays.オフィス.size/totalLocDays*100)},
      自宅:{days:locDays.自宅.size,pct:Math.round(locDays.自宅.size/totalLocDays*100)},
      その他:{days:locDays.その他.size,pct:Math.round(locDays.その他.size/totalLocDays*100)},
      total:totalLocDays
    };

    overrides={ev:{},tk:{}};openDetails={ev:{},tk:{},all:{}};
    const allCats=[...new Set([...calData,...taskData].map(d=>d.label))];
    ["all","ev","tk"].forEach(k=>{filters[k]={};allCats.forEach(c=>{filters[k][c]=true;});});
    updatedAt=new Date().toLocaleTimeString("ja-JP");
    render();
  }catch(e){showError("データ取得エラー: "+(e.result?.error?.message||e.message||JSON.stringify(e)));}
}

function applyOverrides(data,type){
  const map={};
  data.forEach((d,i)=>{
    const newCat=overrides[type][i]||d.label;
    if(!map[newCat])map[newCat]={label:newCat,value:0,count:0,items:[]};
    map[newCat].value+=d.value;map[newCat].count+=d.count;map[newCat].items.push(...d.items);
  });
  return Object.values(map).sort((a,b)=>b.value-a.value);
}
function mergeData(a,b){
  const map={};[...a,...b].forEach(d=>{if(!map[d.label])map[d.label]={label:d.label,value:0,count:0,items:[]};map[d.label].value+=d.value;map[d.label].count+=d.count;map[d.label].items.push(...d.items);});
  return Object.values(map).sort((a,b)=>b.value-a.value);
}
function filterData(data,section){return data.filter(d=>filters[section][d.label]!==false);}
function toggleDetail(type,idx){openDetails[type][idx]=!openDetails[type][idx];render();}
function toggleFilter(section,cat){filters[section][cat]=!filters[section][cat];render();}
function moveItem(type,idx,newCat){overrides[type][idx]=newCat;openDetails={ev:{},tk:{},all:{}};render();}

function filterBar(section,allCats){
  return`<div class="filter-bar">${allCats.map(c=>`<label><input type="checkbox" ${filters[section][c]!==false?"checked":""} onchange="toggleFilter('${section}','${c}')">${c}</label>`).join("")}</div>`;
}

function barChart(rawData,type){
  const data=applyOverrides(rawData,type);
  const filtered=filterData(data,type);
  if(!filtered.length)return'<div class="empty">データなし</div>';
  const max=Math.max(...filtered.map(d=>d.value),0.1);
  return`<div class="swipe-hint">← スワイプでカテゴリ移動</div>`+filtered.map((d,i)=>{
    const isOpen=openDetails[type]&&openDetails[type][i];
    const detail=isOpen?`<div class="detail-box">${d.items.slice().sort((a,b)=>b.dur-a.dur).map(it=>`<div class="detail-row"><span>${it.title}</span><span style="flex-shrink:0">${fmtH(it.dur)}</span></div>`).join("")}</div>`:"";
    const moveOpts=ALL_CATS.filter(c=>c!==d.label).map(c=>`<button class="move-btn" onclick="moveItem('${type}',${i},'${c}')">${c}</button>`).join("");
    return`<div class="bar-wrap" id="${type}-bar-${i}">
      <div class="bar-row" data-type="${type}" data-idx="${i}" onpointerdown="swipeStart(event)" onpointermove="swipeMove(event)" onpointerup="swipeEnd(event)">
        <div class="bar-label" title="${d.label}">${d.label}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.max((d.value/max)*100,2).toFixed(1)}%;background:${COLORS[d.label]||"#888"}"></div></div>
        <button class="bar-btn" onclick="toggleDetail('${type}',${i})">${fmtH(d.value)} (${d.count}) ${isOpen?"▲":"▼"}</button>
      </div>
      <div class="move-overlay" id="move-${type}-${i}">${moveOpts}</div>
      ${detail}
    </div>`;
  }).join("");
}

function swipeStart(e){swipeStartX=e.clientX;swipeStartY=e.clientY;}
function swipeMove(e){e.preventDefault();}
function swipeEnd(e){
  const dx=e.clientX-swipeStartX,dy=e.clientY-swipeStartY;
  if(Math.abs(dx)<30||Math.abs(dy)>Math.abs(dx)*1.5)return;
  const type=e.currentTarget.dataset.type,idx=parseInt(e.currentTarget.dataset.idx);
  const overlayId=`move-${type}-${idx}`;
  document.querySelectorAll('.move-overlay').forEach(el=>{if(el.id!==overlayId)el.classList.remove('show');});
  const overlay=document.getElementById(overlayId);
  if(overlay)overlay.classList.toggle('show');
}

function pieChart(data){
  const total=data.reduce((s,d)=>s+d.value,0);
  if(!total)return'<div class="empty">データなし</div>';
  let cum=-Math.PI/2;
  const paths=data.map(d=>{
    const a=(d.value/total)*2*Math.PI;const sx=cum;cum+=a;
    const r=65,cx=75,cy=75;
    const x1=cx+r*Math.cos(sx),y1=cy+r*Math.sin(sx);
    const x2=cx+r*Math.cos(cum),y2=cy+r*Math.sin(cum);
    return`<path d="M${cx},${cy} L${x1.toFixed(1)},${y1.toFixed(1)} A${r},${r},0,${a>Math.PI?1:0},1,${x2.toFixed(1)},${y2.toFixed(1)} Z" fill="${COLORS[d.label]||"#888"}" stroke="#fff" stroke-width="1.5"/>`;
  }).join("");
  const leg=data.map(d=>{const pct=Math.round(d.value/total*100);return`<div class="legend-item"><div class="legend-dot" style="background:${COLORS[d.label]||"#888"}"></div><span style="color:#666">${d.label}</span><span style="font-weight:500;margin-left:4px">${pct}%（${fmtH(d.value)}）</span></div>`;}).join("");
  return`<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap"><svg viewBox="0 0 150 150" width="120" height="120" style="flex-shrink:0">${paths}</svg><div class="legend">${leg}</div></div>`;
}

function locationSection(){
  const locs=["オフィス","自宅","その他"];
  const total=locData.total||1;
  const cards=locs.map(l=>{
    const d=locData[l]||{days:0,pct:0};
    return`<div class="loc-card"><div class="loc-card-label">${l}</div><div class="loc-card-value">${d.days}日</div><div class="loc-card-sub">${d.pct}%</div></div>`;
  }).join("");
  const bars=locs.map(l=>{
    const d=locData[l]||{days:0,pct:0};
    return`<div class="loc-bar-row"><div class="loc-bar-label">${l}</div><div class="loc-bar-track"><div class="loc-bar-fill" style="width:${d.pct}%;background:${LOC_COLORS[l]}"></div></div><div class="loc-bar-val">${d.days}日 (${d.pct}%)</div></div>`;
  }).join("");
  return`<div class="location-box"><div class="location-title">勤務場所</div><div class="loc-grid">${cards}</div>${bars}</div>`;
}

function sectionHTML(title,rawData,type,allCats){
  const data=filterData(applyOverrides(rawData,type),type);
  return`<div class="section-title">${title}</div>${filterBar(type,allCats)}<div class="grid"><div class="box"><div class="box-title">カテゴリ別時間</div>${barChart(rawData,type)}</div><div class="box"><div class="box-title">割合</div>${pieChart(data)}</div></div>`;
}

function copyForAI(){
  const labels={day:"1日",week:"直近1週間",month:"直近1ヶ月"};
  const evD=applyOverrides(calData,"ev"),tkD=applyOverrides(taskData,"tk");
  const ev=evD.map(d=>`${d.label}:${fmtH(d.value)}(${d.count}件)`).join(", ");
  const tk=tkD.map(d=>`${d.label}:${fmtH(d.value)}(${d.count}件)`).join(", ");
  const loc=["オフィス","自宅","その他"].map(l=>`${l}:${(locData[l]||{days:0}).days}日`).join(", ");
  const text=`${labels[period]}（${getPeriodLabel(period)}）の作業データです。\n予定: ${ev||"なし"}\nタスク: ${tk||"なし"}\n勤務場所: ${loc}\n\n上記データをもとに100〜150字で振り返りコメントをください。`;
  navigator.clipboard.writeText(text).then(()=>{const b=document.getElementById("copy-btn");if(b){b.textContent="コピーしました！";setTimeout(()=>{if(b)b.textContent="Claudeへのプロンプトをコピー";},2000);}});
}

function render(){
  const evApplied=applyOverrides(calData,"ev");
  const tkApplied=applyOverrides(taskData,"tk");
  const allData=mergeData(evApplied,tkApplied);
  const allCats=[...new Set(allData.map(d=>d.label))];
  ["all","ev","tk"].forEach(k=>{allCats.forEach(c=>{if(filters[k][c]===undefined)filters[k][c]=true;});});

  const totalEv=evApplied.reduce((s,d)=>s+d.value,0);
  const totalTk=tkApplied.reduce((s,d)=>s+d.value,0);
  const countEv=evApplied.reduce((s,d)=>s+d.count,0);
  const countTk=tkApplied.reduce((s,d)=>s+d.count,0);
  const totalAll=totalEv+totalTk;
  const countAll=countEv+countTk;

  const tabs=["month","week","day"].map(t=>`<button class="tab${period===t?" active":""}" onclick="changePeriod('${t}')">${{month:"1ヶ月",week:"1週間",day:"1日"}[t]}</button>`).join("");

  const allFiltered=filterData(allData,"all");
  const allBarChart=allFiltered.length?allFiltered.map((d,i)=>{
    const max=Math.max(...allFiltered.map(x=>x.value),0.1);
    const isOpen=openDetails.all&&openDetails.all[i];
    const detail=isOpen?`<div class="detail-box">${d.items.slice().sort((a,b)=>b.dur-a.dur).map(it=>`<div class="detail-row"><span>${it.title}</span><span style="flex-shrink:0">${fmtH(it.dur)}</span></div>`).join("")}</div>`:"";
    return`<div><div class="bar-row"><div class="bar-label" title="${d.label}">${d.label}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.max((d.value/max)*100,2).toFixed(1)}%;background:${COLORS[d.label]||"#888"}"></div></div><button class="bar-btn" onclick="toggleDetail('all',${i})">${fmtH(d.value)} (${d.count}) ${isOpen?"▲":"▼"}</button></div>${detail}</div>`;
  }).join(""):'<div class="empty">データなし</div>';

  document.getElementById("app").innerHTML=`
    <div class="header"><h1>作業レポート</h1><div class="header-right">${updatedAt?`<span class="meta">${updatedAt} 更新</span>`:""}<button onclick="fetchData()">更新</button><button onclick="signOut()" style="opacity:0.6">ログアウト</button></div></div>
    <div class="tabs">${tabs}</div>
    <div class="period-label">${getPeriodLabel(period)}</div>

    <div class="summary-grid">
      <div class="summary-col">
        <div class="summary-col-title">合計</div>
        <div class="summary-item"><div class="summary-label">合計時間</div><div class="summary-value">${fmtH(totalAll)}</div></div>
        <div class="summary-item"><div class="summary-label">合計件数</div><div class="summary-value">${countAll}件</div></div>
      </div>
      <div class="summary-col">
        <div class="summary-col-title">予定</div>
        <div class="summary-item"><div class="summary-label">予定時間</div><div class="summary-value">${fmtH(totalEv)}</div></div>
        <div class="summary-item"><div class="summary-label">予定件数</div><div class="summary-value">${countEv}件</div></div>
      </div>
      <div class="summary-col">
        <div class="summary-col-title">タスク</div>
        <div class="summary-item"><div class="summary-label">タスク時間</div><div class="summary-value">${fmtH(totalTk)}</div></div>
        <div class="summary-item"><div class="summary-label">タスク件数</div><div class="summary-value">${countTk}件</div></div>
      </div>
    </div>

    <div class="section-title">合計</div>
    ${filterBar("all",allCats)}
    <div class="grid">
      <div class="box"><div class="box-title">カテゴリ別時間</div>${allBarChart}</div>
      <div class="box"><div class="box-title">割合</div>${pieChart(allFiltered)}</div>
    </div>

    ${sectionHTML("予定",calData,"ev",allCats)}
    ${sectionHTML("タスク",taskData,"tk",allCats)}

    ${locationSection()}

    <div class="ai-box">
      <div class="ai-title">AI 振り返りコメント</div>
      <div class="ai-text">データをコピーしてClaude.aiに貼り付けると振り返りコメントを生成できます。</div>
      <div style="margin-top:10px"><button id="copy-btn" onclick="copyForAI()">Claudeへのプロンプトをコピー</button></div>
      <div class="copy-hint">コピー後、claude.ai のチャットに貼り付けてください。</div>
    </div>`;
}

function changePeriod(p){period=p;openDetails={ev:{},tk:{},all:{}};filters={all:{},ev:{},tk:{}};overrides={ev:{},tk:{}};fetchData();}
setInterval(()=>{try{if(gapi.client.getToken())fetchData();}catch(e){}},300000);
</script>
<script src="https://apis.google.com/js/api.js" onload="gapiInit()"></script>
<script src="https://accounts.google.com/gsi/client" onload="gisInit()"></script>
</body>
</html>
