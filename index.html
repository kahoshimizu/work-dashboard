<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>作業レポートダッシュボード</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a;padding:16px}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
h1{font-size:18px;font-weight:500}
.header-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.meta{font-size:12px;color:#999}
.tabs{display:flex;gap:4px;border-bottom:1px solid #ddd;margin-bottom:4px}
.tab{padding:8px 16px;border:none;background:transparent;cursor:pointer;font-size:14px;color:#666;border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.active{color:#1a1a1a;font-weight:500;border-bottom-color:#1a1a1a}
.period-label{font-size:12px;color:#999;margin-bottom:14px}
.summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.summary-col{background:#fff;border-radius:10px;border:1px solid #eee;padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.summary-col-title{font-size:11px;color:#aaa;font-weight:500;letter-spacing:0.03em;margin-bottom:2px}
.summary-label{font-size:11px;color:#888;margin-bottom:2px}
.summary-value{font-size:18px;font-weight:500;color:#1a1a1a}
.section-title{font-size:15px;font-weight:500;margin:18px 0 8px}
.filter-bar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;background:#fff;border:1px solid #eee;border-radius:8px;padding:8px 12px}
.filter-bar label{display:flex;align-items:center;gap:4px;font-size:12px;color:#555;cursor:pointer;user-select:none}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;margin-bottom:8px}
.box{background:#fff;border-radius:12px;padding:14px 18px;border:1px solid #eee}
.box-title{font-size:13px;font-weight:500;margin-bottom:10px;color:#444}
.bar-wrap{position:relative;margin-bottom:6px}
.bar-row{display:flex;align-items:center;gap:8px;font-size:13px;cursor:grab}
.bar-label{width:86px;text-align:right;color:#666;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;padding:4px 0}
.bar-track{flex:1;background:#f0f0f0;border-radius:4px;height:16px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px}
.bar-btn{border:none;background:transparent;cursor:pointer;font-size:11px;font-weight:500;color:#1a1a1a;padding:2px 5px;border-radius:4px;white-space:nowrap;min-width:80px;text-align:left}
.bar-btn:hover{background:#f0f0f0}
.detail-box{background:#f9f9f9;border:1px solid #eee;border-radius:8px;padding:8px 12px;margin:4px 0 8px 0;font-size:11px}
.detail-row{display:grid;grid-template-columns:72px 1fr 44px;gap:6px;padding:3px 0;color:#555;border-bottom:0.5px solid #eee}
.detail-row:last-child{border-bottom:none}
.detail-date{color:#999;font-size:10px;padding-top:1px}
.detail-title{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.detail-dur{text-align:right;flex-shrink:0;font-weight:500}
.drop-zone{border:2px dashed transparent;border-radius:8px;transition:border-color 0.2s,background 0.2s;padding:2px}
.drop-zone.drag-over{border-color:#54C3F1;background:rgba(84,195,241,0.06)}
.dragging .bar-row{opacity:0.4}
.legend{display:flex;flex-direction:column;gap:5px;font-size:12px}
.legend-item{display:flex;align-items:center;gap:6px}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.loc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;margin-bottom:8px}
.loc-box{background:#fff;border-radius:12px;padding:14px 18px;border:1px solid #eee}
.loc-bar-row{display:flex;align-items:center;gap:8px;font-size:12px;margin-bottom:6px;cursor:pointer}
.loc-bar-label{width:64px;text-align:right;color:#666;flex-shrink:0}
.loc-bar-track{flex:1;background:#f0f0f0;border-radius:4px;height:14px;overflow:hidden}
.loc-bar-fill{height:100%;border-radius:4px}
.loc-bar-val{font-size:11px;color:#444;min-width:70px}
.loc-detail{background:#f9f9f9;border:1px solid #eee;border-radius:8px;padding:8px 12px;margin:4px 0 8px 72px;font-size:11px}
.loc-detail-dates{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.loc-date-chip{background:#fff;border:1px solid #ddd;border-radius:10px;padding:2px 8px;font-size:11px;color:#555}
.ai-box{background:#f9f9f9;border-radius:12px;padding:14px 18px;border:1px solid #eee;margin-top:14px}
.ai-title{font-size:14px;font-weight:500;margin-bottom:6px}
.ai-text{font-size:13px;color:#555;line-height:1.7}
.copy-hint{font-size:11px;color:#888;margin-top:6px}
.cal-picker{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1000;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.3)}
.cal-box{background:#fff;border-radius:14px;padding:16px;width:300px;box-shadow:0 8px 32px rgba(0,0,0,0.18)}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-month-label{font-size:14px;font-weight:500}
.cal-nav{background:none;border:none;font-size:18px;cursor:pointer;padding:2px 8px;border-radius:6px;color:#555}
.cal-nav:hover{background:#f0f0f0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dow{font-size:10px;color:#aaa;text-align:center;padding:2px 0}
.cal-day{font-size:12px;text-align:center;padding:5px 2px;border-radius:6px;cursor:pointer;border:none;background:none;color:#1a1a1a}
.cal-day:hover{background:#f0f0f0}
.cal-day.today{font-weight:700;color:#1a73e8}
.cal-day.selected{background:#1a73e8;color:#fff}
.cal-day.in-range{background:#e8f2fb}
.cal-day.faded{color:#ccc}
.cal-day.weekend{color:#e08}
.cal-close{margin-top:12px;width:100%;padding:7px;font-size:13px;border-radius:8px;border:1px solid #ddd;background:#fff;cursor:pointer}
.cal-close:hover{background:#f0f0f0}
button{background:#fff;border:1px solid #ddd;border-radius:6px;padding:5px 12px;cursor:pointer;font-size:13px}
button:hover{background:#f5f5f5}
.loading{text-align:center;padding:48px;color:#888;font-size:14px}
.error{background:#fff0f0;border:1px solid #fcc;color:#c33;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px}
.empty{font-size:13px;color:#aaa;text-align:center;padding:14px 0}
</style>
</head>
<body>
<div id="app"><div class="loading">読み込み中…</div></div>
<script>
const CLIENT_ID="729656531255-stonbhee0o8m10gfbqckf1bp2fump90g.apps.googleusercontent.com";
const SCOPES="https://www.googleapis.com/auth/calendar.readonly";
const COLORS={
  "PJ":"#54C3F1","foobar*":"#F9C270","未分類":"#C1DB81",
  "新卒 1on1":"#EF858C","UM 1on1":"#EF845C","PMP":"#796BAF"
};
const LOC_COLORS={"オフィス":"#6C9BD2","自宅":"#69BD83","その他":"#EF845C"};
const ALL_CATS=["PJ","新卒 1on1","UM 1on1","PMP","foobar*","未分類"];
const DAYS=["日","月","火","水","木","金","土"];

// イベントカテゴリ削除・foobar*に統合
const RULES=[
  {m:t=>/JMB/i.test(t)||/^タスク確認/.test(t)||/JAL/i.test(t)||/SSNB/i.test(t)||/定例/.test(t)||/リリース/.test(t)||/Liquid/i.test(t)||/サーバ/.test(t),c:"PJ"},
  {m:t=>/foobar/i.test(t)||/foobar\*/i.test(t)||/MM/.test(t)||/DCC/.test(t)||/KAITEKI/i.test(t)||/カクヤス/.test(t)||/Monthly Mixer/i.test(t)||/CTOs Beer/i.test(t)||/Designer.*s Creative Circle/i.test(t)||/イベント/.test(t)||/Circle/i.test(t),c:"foobar*"},
  {m:t=>/^Kaho \/ Miu/.test(t)||/^Kaho \/ Emiri/.test(t)||/^Emiri \/ Kaho/.test(t)||/^Miu \/ Kaho/.test(t)||/^Miu\/Kaho/.test(t)||/新卒/.test(t),c:"新卒 1on1"},
  {m:t=>/^Masanori \/ Kaho/.test(t)||/^Satoshi \/ Kaho/.test(t)||/^\[上期評価FB\]/.test(t),c:"UM 1on1"},
  {m:t=>/\[FY26\]PMP1[：:].*定例/.test(t)||/General MTG for PMPs/.test(t),c:"PMP"},
];

function isExcluded(ev){return ev.colorId==="4"||ev.colorId==="8";}
function categorize(t){for(const r of RULES)if(r.m(t))return r.c;return"未分類";}
function fmtH(h){return h<0.05?"0h":h.toFixed(1)+"h";}
function fmtDate(d){return`${d.getMonth()+1}/${d.getDate()}(${DAYS[d.getDay()]})`;}
function fmtDateKey(s){return fmtDate(new Date(s));}
function isWeekend(dateStr){const d=new Date(dateStr);return d.getDay()===0||d.getDay()===6;}

// 直近の月曜を返す（今日が月曜ならそのまま）
function lastMonday(base){
  const d=new Date(base);
  const dow=d.getDay();
  const diff=dow===0?6:dow-1;
  d.setDate(d.getDate()-diff);
  d.setHours(0,0,0,0);
  return d;
}

function getRange(p){
  const now=new Date();
  if(p==="day"){
    const base=customStart?new Date(customStart):new Date(now);
    base.setDate(base.getDate()+periodOffset);
    const s=new Date(base);s.setHours(0,0,0,0);
    const e=new Date(base);e.setHours(23,59,59,999);
    return{start:s,end:e};
  }
  if(p==="week"){
    // 月曜始まり
    const mon=customStart?new Date(customStart):lastMonday(now);
    mon.setDate(mon.getDate()+periodOffset*7);
    const s=new Date(mon);s.setHours(0,0,0,0);
    const e=new Date(mon);e.setDate(mon.getDate()+6);e.setHours(23,59,59,999);
    return{start:s,end:e};
  }
  // month: 月曜始まりの週から4週間
  const mon=customStart?new Date(customStart):lastMonday(now);
  mon.setDate(mon.getDate()+periodOffset*28);
  const s=new Date(mon);s.setHours(0,0,0,0);
  const e=new Date(mon);e.setDate(mon.getDate()+27);e.setHours(23,59,59,999);
  return{start:s,end:e};
}
function getPeriodLabel(p){const{start,end}=getRange(p);if(p==="day")return fmtDate(start);return`${fmtDate(start)}〜${fmtDate(end)}`;}

let period="week",periodOffset=0,customStart=null,tokenClient,gapiDone=false,gisDone=false;
let calData=[],taskData=[],locData={},updatedAt="";
let openDetails={ev:{},tk:{},all:{}};
let filters={all:{},ev:{},tk:{}};
let overrides={ev:{},tk:{}};
let locOpenDetail=null;
let dragState=null;

function tryReady(){
  if(!gapiDone||!gisDone)return;
  document.getElementById("app").innerHTML=`<div class="loading"><div style="font-size:15px;font-weight:500;margin-bottom:8px">作業レポートダッシュボード</div><div style="font-size:13px;color:#888;margin-bottom:20px">Googleアカウントでログインしてください</div><button onclick="signIn()" style="font-size:14px;padding:10px 28px;font-weight:500;background:#1a73e8;color:#fff;border:none;border-radius:8px;cursor:pointer">Googleでログイン</button></div>`;
}
function gapiInit(){gapi.load("client",async()=>{await gapi.client.load("https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest");gapiDone=true;tryReady();});}
function gisInit(){tokenClient=google.accounts.oauth2.initTokenClient({client_id:CLIENT_ID,scope:SCOPES,callback:(resp)=>{if(resp.error){showError("認証エラー: "+resp.error);return;}fetchData();}});gisDone=true;tryReady();}
function signIn(){tokenClient.requestAccessToken({prompt:"consent"});}
function signOut(){const t=gapi.client.getToken();if(t)google.accounts.oauth2.revoke(t.access_token,()=>{});gapi.client.setToken(null);document.getElementById("app").innerHTML=`<div class="loading"><div style="margin-bottom:12px">ログアウトしました</div><button onclick="signIn()" style="font-size:14px;padding:10px 28px;background:#1a73e8;color:#fff;border:none;border-radius:8px;cursor:pointer">再ログイン</button></div>`;}
function showError(msg){let el=document.getElementById("err");if(!el){el=document.createElement("div");el.id="err";el.className="error";document.getElementById("app").prepend(el);}el.textContent=msg;}

async function fetchData(){
  try{
    const{start,end}=getRange(period);

    // 通常イベント取得
    const calRes=await gapi.client.calendar.events.list({
      calendarId:"primary",timeMin:start.toISOString(),timeMax:end.toISOString(),
      singleEvents:true,orderBy:"startTime",maxResults:500
    });
    const items=calRes.result.items||[];
    let myEmail="";
    try{myEmail=(await gapi.client.calendar.calendarList.get({calendarId:"primary"})).result.id;}catch(e){}

    // 勤務場所イベント取得（eventType=workingLocation）
    let locItems=[];
    try{
      const locRes=await gapi.client.calendar.events.list({
        calendarId:"primary",timeMin:start.toISOString(),timeMax:end.toISOString(),
        singleEvents:true,orderBy:"startTime",maxResults:500,
        eventTypes:["workingLocation"]
      });
      locItems=locRes.result.items||[];
    }catch(e){
      // フォールバック：eventTypesが未対応の場合
      locItems=items.filter(ev=>ev.eventType==="workingLocation");
    }

    const catMap={},taskMap={};
    const locDays={オフィス:new Map(),自宅:new Map(),その他:new Map()};

    // 勤務場所イベントを日付→場所にマッピング
    locItems.forEach(ev=>{
      const dateStr=ev.start?.date||ev.start?.dateTime?.slice(0,10);
      if(!dateStr)return;
      if(isWeekend(dateStr))return;
      // workingLocation の場所判定
      const wl=ev.workingLocation;
      let loc=null;
      if(wl){
        if(wl.type==="homeOffice"||wl.homeOffice!=null)loc="自宅";
        else if(wl.type==="officeLocation"||wl.office!=null||wl.officeLocation!=null)loc="オフィス";
        else if(wl.type==="customLocation"||wl.customLocation!=null)loc="その他";
      }
      // フォールバック：タイトルで判定
      if(!loc){
        const t=(ev.summary||"").toLowerCase();
        if(/自宅|home|リモート|remote|wfh/.test(t))loc="自宅";
        else if(/オフィス|office|出社/.test(t))loc="オフィス";
        else loc="その他";
      }
      const label=fmtDate(new Date(dateStr));
      // 同じ日に複数設定がある場合は最初のものを優先
      if(!locDays[loc].has(dateStr))locDays[loc].set(dateStr,label);
    });

    const totalLocDays=new Set([...locDays.オフィス.keys(),...locDays.自宅.keys(),...locDays.その他.keys()]).size||1;
    locData={
      オフィス:{days:locDays.オフィス.size,pct:Math.round(locDays.オフィス.size/totalLocDays*100),dates:[...locDays.オフィス.values()].sort()},
      自宅:{days:locDays.自宅.size,pct:Math.round(locDays.自宅.size/totalLocDays*100),dates:[...locDays.自宅.values()].sort()},
      その他:{days:locDays.その他.size,pct:Math.round(locDays.その他.size/totalLocDays*100),dates:[...locDays.その他.values()].sort()},
      total:totalLocDays
    };

    // 通常予定・タスク集計
    items.forEach(ev=>{
      if(isExcluded(ev))return;
      if(ev.eventType==="workingLocation"||ev.eventType==="outOfOffice")return;
      if(ev.start?.date&&!ev.start?.dateTime)return;
      if(!ev.start?.dateTime||!ev.end?.dateTime)return;
      const dur=(new Date(ev.end.dateTime)-new Date(ev.start.dateTime))/3600000;
      if(dur<=0)return;
      const title=ev.summary||"",desc=ev.description||"";
      const isTask=desc.includes("tasks.google.com/task/");
      if(!isTask&&(/^不在$/.test(title.trim())||/^移動$/.test(title.trim())))return;
      const dateLabel=fmtDateKey(ev.start.dateTime);
      const dateSort=ev.start.dateTime;
      if(isTask){
        const cat=categorize(title);
        if(!taskMap[cat])taskMap[cat]={value:0,count:0,items:[]};
        taskMap[cat].value+=dur;taskMap[cat].count++;taskMap[cat].items.push({title,dur,dateLabel,dateSort});
        return;
      }
      if(ev.attendees&&ev.attendees.length>0){
        const me=ev.attendees.find(a=>a.self||(myEmail&&a.email===myEmail));
        if(me&&(me.responseStatus==="declined"||me.responseStatus==="tentative"||me.responseStatus==="needsAction"))return;
      }
      const cat=categorize(title);
      if(!catMap[cat])catMap[cat]={value:0,count:0,items:[]};
      catMap[cat].value+=dur;catMap[cat].count++;catMap[cat].items.push({title,dur,dateLabel,dateSort});
    });

    calData=Object.entries(catMap).map(([label,d])=>({label,value:d.value,count:d.count,items:d.items})).sort((a,b)=>b.value-a.value);
    taskData=Object.entries(taskMap).map(([label,d])=>({label,value:d.value,count:d.count,items:d.items})).sort((a,b)=>b.value-a.value);

    overrides={ev:{},tk:{}};openDetails={ev:{},tk:{},all:{}};
    const allCats=[...new Set([...calData,...taskData].map(d=>d.label))];
    ["all","ev","tk"].forEach(k=>{filters[k]={};allCats.forEach(c=>{filters[k][c]=true;});});
    updatedAt=new Date().toLocaleTimeString("ja-JP");
    render();
  }catch(e){showError("データ取得エラー: "+(e.result?.error?.message||e.message||JSON.stringify(e)));}
}

function applyOverrides(data,type){
  const map={};
  data.forEach((d,i)=>{
    const nc=overrides[type][i]||d.label;
    if(!map[nc])map[nc]={label:nc,value:0,count:0,items:[]};
    map[nc].value+=d.value;map[nc].count+=d.count;map[nc].items.push(...d.items);
  });
  return Object.values(map).sort((a,b)=>b.value-a.value);
}
function mergeData(a,b){
  const map={};[...a,...b].forEach(d=>{if(!map[d.label])map[d.label]={label:d.label,value:0,count:0,items:[]};map[d.label].value+=d.value;map[d.label].count+=d.count;map[d.label].items.push(...d.items);});
  return Object.values(map).sort((a,b)=>b.value-a.value);
}
function filterData(data,sec){return data.filter(d=>filters[sec][d.label]!==false);}
function toggleDetail(type,idx){openDetails[type][idx]=!openDetails[type][idx];render();}
function toggleFilter(sec,cat){filters[sec][cat]=!filters[sec][cat];render();}
function moveItem(type,fromIdx,newCat){overrides[type][fromIdx]=newCat;openDetails={ev:{},tk:{},all:{}};render();}
function toggleLocDetail(loc){locOpenDetail=locOpenDetail===loc?null:loc;render();}

function onDragStart(e,type,idx,label){
  dragState={type,idx,label};
  e.dataTransfer.effectAllowed="move";
  e.dataTransfer.setData("text/plain",label);
  setTimeout(()=>{const w=e.currentTarget.closest(".bar-wrap");if(w)w.classList.add("dragging");},0);
}
function onDragEnd(){
  dragState=null;
  document.querySelectorAll(".bar-wrap").forEach(el=>el.classList.remove("dragging"));
  document.querySelectorAll(".drop-zone").forEach(el=>el.classList.remove("drag-over"));
}
function onDragOver(e){e.preventDefault();e.currentTarget.classList.add("drag-over");}
function onDragLeave(e){e.currentTarget.classList.remove("drag-over");}
function onDrop(e,type,newCat){
  e.preventDefault();e.currentTarget.classList.remove("drag-over");
  if(!dragState||dragState.type!==type||dragState.label===newCat)return;
  moveItem(type,dragState.idx,newCat);dragState=null;
}

function filterBar(sec,allCats){
  return`<div class="filter-bar">${allCats.map(c=>`<label><input type="checkbox" ${filters[sec][c]!==false?"checked":""} onchange="toggleFilter('${sec}','${c}')">${c}</label>`).join("")}</div>`;
}
function detailBox(items){
  const sorted=items.slice().sort((a,b)=>a.dateSort<b.dateSort?-1:1);
  return`<div class="detail-box">${sorted.map(it=>`<div class="detail-row"><span class="detail-date">${it.dateLabel}</span><span class="detail-title">${it.title}</span><span class="detail-dur">${fmtH(it.dur)}</span></div>`).join("")}</div>`;
}
function barChart(rawData,type){
  const data=applyOverrides(rawData,type);
  const filtered=filterData(data,type);
  if(!filtered.length)return'<div class="empty">データなし</div>';
  const max=Math.max(...filtered.map(d=>d.value),0.1);
  return`<div style="font-size:10px;color:#bbb;text-align:right;margin-bottom:6px">← ドラッグ＆ドロップで移動</div>`+filtered.map((d,i)=>{
    const isOpen=openDetails[type]&&openDetails[type][i];
    return`<div class="bar-wrap drop-zone" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event,'${type}','${d.label}')">
      <div class="bar-row" draggable="true" ondragstart="onDragStart(event,'${type}',${i},'${d.label}')" ondragend="onDragEnd()">
        <div class="bar-label" title="${d.label}">${d.label}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.max((d.value/max)*100,2).toFixed(1)}%;background:${COLORS[d.label]||"#aaa"}"></div></div>
        <button class="bar-btn" onclick="toggleDetail('${type}',${i})">${fmtH(d.value)} (${d.count}) ${isOpen?"▲":"▼"}</button>
      </div>
      ${isOpen?detailBox(d.items):""}
    </div>`;
  }).join("");
}
function pieChart(data,colorMap){
  const cm=colorMap||COLORS;
  const total=data.reduce((s,d)=>s+d.value,0);
  if(!total)return'<div class="empty">データなし</div>';
  let paths="";
  if(data.length===1){
    paths=`<circle cx="75" cy="75" r="65" fill="${cm[data[0].label]||"#aaa"}"/>`;
  }else{
    let cum=-Math.PI/2;
    paths=data.map(d=>{
      const a=(d.value/total)*2*Math.PI;const sx=cum;cum+=a;
      const r=65,cx=75,cy=75;
      const x1=cx+r*Math.cos(sx),y1=cy+r*Math.sin(sx);
      const x2=cx+r*Math.cos(cum),y2=cy+r*Math.sin(cum);
      return`<path d="M${cx},${cy} L${x1.toFixed(1)},${y1.toFixed(1)} A${r},${r},0,${a>Math.PI?1:0},1,${x2.toFixed(1)},${y2.toFixed(1)} Z" fill="${cm[d.label]||"#aaa"}" stroke="#fff" stroke-width="1.5"/>`;
    }).join("");
  }
  const leg=data.map(d=>{const pct=Math.round(d.value/total*100);return`<div class="legend-item"><div class="legend-dot" style="background:${cm[d.label]||"#aaa"}"></div><span style="color:#666">${d.label}</span><span style="font-weight:500;margin-left:4px">${pct}%（${fmtH(d.value)}）</span></div>`;}).join("");
  return`<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap"><svg viewBox="0 0 150 150" width="120" height="120" style="flex-shrink:0">${paths}</svg><div class="legend">${leg}</div></div>`;
}
function locPieChart(){
  const locs=["オフィス","自宅","その他"].filter(l=>(locData[l]||{days:0}).days>0);
  const total=locs.reduce((s,l)=>s+(locData[l]||{days:0}).days,0);
  if(!total)return'<div class="empty">データなし</div>';
  const data=locs.map(l=>({label:l,value:(locData[l]||{days:0}).days}));
  let paths="";
  if(data.length===1){paths=`<circle cx="75" cy="75" r="65" fill="${LOC_COLORS[data[0].label]}"/>`;}
  else{
    let cum=-Math.PI/2;
    paths=data.map(d=>{
      const a=(d.value/total)*2*Math.PI;const sx=cum;cum+=a;
      const r=65,cx=75,cy=75;
      const x1=cx+r*Math.cos(sx),y1=cy+r*Math.sin(sx);
      const x2=cx+r*Math.cos(cum),y2=cy+r*Math.sin(cum);
      return`<path d="M${cx},${cy} L${x1.toFixed(1)},${y1.toFixed(1)} A${r},${r},0,${a>Math.PI?1:0},1,${x2.toFixed(1)},${y2.toFixed(1)} Z" fill="${LOC_COLORS[d.label]}" stroke="#fff" stroke-width="1.5"/>`;
    }).join("");
  }
  const leg=data.map(d=>{const pct=Math.round(d.value/total*100);return`<div class="legend-item"><div class="legend-dot" style="background:${LOC_COLORS[d.label]}"></div><span style="color:#666">${d.label}</span><span style="font-weight:500;margin-left:4px">${pct}%（${d.value}日）</span></div>`;}).join("");
  return`<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap"><svg viewBox="0 0 150 150" width="120" height="120" style="flex-shrink:0">${paths}</svg><div class="legend">${leg}</div></div>`;
}
function locationSection(){
  const locs=["オフィス","自宅","その他"];
  const bars=locs.map(l=>{
    const d=locData[l]||{days:0,pct:0,dates:[]};
    const isOpen=locOpenDetail===l;
    const detail=isOpen&&d.dates.length?`<div class="loc-detail"><div class="loc-detail-dates">${d.dates.map(dt=>`<span class="loc-date-chip">${dt}</span>`).join("")}</div></div>`:"";
    return`<div>
      <div class="loc-bar-row" onclick="toggleLocDetail('${l}')">
        <div class="loc-bar-label">${l}</div>
        <div class="loc-bar-track"><div class="loc-bar-fill" style="width:${d.pct}%;background:${LOC_COLORS[l]}"></div></div>
        <div class="loc-bar-val">${d.days}日 (${d.pct}%) ${isOpen?"▲":"▼"}</div>
      </div>${detail}</div>`;
  }).join("");
  return`<div class="section-title">勤務場所</div>
  <div class="loc-grid">
    <div class="loc-box"><div class="box-title">日数</div>${bars}</div>
    <div class="loc-box"><div class="box-title">割合</div>${locPieChart()}</div>
  </div>`;
}
function sectionHTML(title,rawData,type,allCats){
  const applied=applyOverrides(rawData,type);
  const filtered=filterData(applied,type);
  return`<div class="section-title">${title}</div>${filterBar(type,allCats)}<div class="grid"><div class="box"><div class="box-title">カテゴリ別時間</div>${barChart(rawData,type)}</div><div class="box"><div class="box-title">割合</div>${pieChart(filtered)}</div></div>`;
}
function copyForAI(){
  const labels={day:"1日",week:"直近1週間",month:"直近1ヶ月"};
  const evD=applyOverrides(calData,"ev"),tkD=applyOverrides(taskData,"tk");
  const ev=evD.map(d=>`${d.label}:${fmtH(d.value)}(${d.count}件)`).join(", ");
  const tk=tkD.map(d=>`${d.label}:${fmtH(d.value)}(${d.count}件)`).join(", ");
  const loc=["オフィス","自宅","その他"].map(l=>`${l}:${(locData[l]||{days:0}).days}日`).join(", ");
  const text=`${labels[period]}（${getPeriodLabel(period)}）の作業データです。\n予定: ${ev||"なし"}\nタスク: ${tk||"なし"}\n勤務場所: ${loc}\n\n上記データをもとに100〜150字で振り返りコメントをください。`;
  navigator.clipboard.writeText(text).then(()=>{const b=document.getElementById("copy-btn");if(b){b.textContent="コピーしました！";setTimeout(()=>{if(b)b.textContent="Claudeへのプロンプトをコピー";},2000);}});
}
function render(){
  const evApplied=applyOverrides(calData,"ev");
  const tkApplied=applyOverrides(taskData,"tk");
  const allData=mergeData(evApplied,tkApplied);
  const allCats=[...new Set(allData.map(d=>d.label))];
  ["all","ev","tk"].forEach(k=>{allCats.forEach(c=>{if(filters[k][c]===undefined)filters[k][c]=true;});});
  const totalEv=evApplied.reduce((s,d)=>s+d.value,0);
  const totalTk=tkApplied.reduce((s,d)=>s+d.value,0);
  const countEv=evApplied.reduce((s,d)=>s+d.count,0);
  const countTk=tkApplied.reduce((s,d)=>s+d.count,0);
  const tabs=["month","week","day"].map(t=>`<button class="tab${period===t?" active":""}" onclick="changePeriod('${t}')">${{month:"1ヶ月",week:"1週間",day:"1日"}[t]}</button>`).join("");
  const allFiltered=filterData(allData,"all");
  const allBarHTML=allFiltered.length?allFiltered.map((d,i)=>{
    const max=Math.max(...allFiltered.map(x=>x.value),0.1);
    const isOpen=openDetails.all&&openDetails.all[i];
    return`<div><div class="bar-row"><div class="bar-label" title="${d.label}">${d.label}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.max((d.value/max)*100,2).toFixed(1)}%;background:${COLORS[d.label]||"#aaa"}"></div></div><button class="bar-btn" onclick="toggleDetail('all',${i})">${fmtH(d.value)} (${d.count}) ${isOpen?"▲":"▼"}</button></div>${isOpen?detailBox(d.items):""}</div>`;
  }).join(""):'<div class="empty">データなし</div>';

  document.getElementById("app").innerHTML=`
    <div class="header"><h1>作業レポート</h1><div class="header-right">${updatedAt?`<span class="meta">${updatedAt} 更新</span>`:""}<button onclick="fetchData()">更新</button><button onclick="signOut()" style="opacity:0.6">ログアウト</button></div></div>
    <div class="tabs">${tabs}</div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
      <button onclick="shiftPeriod(-1)" style="padding:2px 10px;font-size:16px">&#8249;</button>
      <button onclick="openPicker()" style="font-size:12px;color:#555;border:1px solid #ddd;background:#fff;border-radius:8px;padding:4px 12px;min-width:160px;text-align:center;cursor:pointer">${getPeriodLabel(period)}</button>
      <button onclick="shiftPeriod(1)" style="padding:2px 10px;font-size:16px;opacity:${(()=>{const{end}=getRange(period);const now=new Date();now.setHours(23,59,59,999);return end>=now?0.3:1})()}">&#8250;</button>
    </div>
    <div class="summary-grid">
      <div class="summary-col"><div class="summary-col-title">合計</div><div><div class="summary-label">合計時間</div><div class="summary-value">${fmtH(totalEv+totalTk)}</div></div><div><div class="summary-label">合計件数</div><div class="summary-value">${countEv+countTk}件</div></div></div>
      <div class="summary-col"><div class="summary-col-title">予定</div><div><div class="summary-label">予定時間</div><div class="summary-value">${fmtH(totalEv)}</div></div><div><div class="summary-label">予定件数</div><div class="summary-value">${countEv}件</div></div></div>
      <div class="summary-col"><div class="summary-col-title">タスク</div><div><div class="summary-label">タスク時間</div><div class="summary-value">${fmtH(totalTk)}</div></div><div><div class="summary-label">タスク件数</div><div class="summary-value">${countTk}件</div></div></div>
    </div>
    <div class="section-title">合計</div>${filterBar("all",allCats)}
    <div class="grid"><div class="box"><div class="box-title">カテゴリ別時間</div>${allBarHTML}</div><div class="box"><div class="box-title">割合</div>${pieChart(allFiltered)}</div></div>
    ${sectionHTML("予定",calData,"ev",allCats)}
    ${sectionHTML("タスク",taskData,"tk",allCats)}
    ${locationSection()}
    <div class="ai-box">
      <div class="ai-title">AI 振り返りコメント</div>
      <div class="ai-text">データをコピーしてClaude.aiに貼り付けると振り返りコメントを生成できます。</div>
      <div style="margin-top:10px"><button id="copy-btn" onclick="copyForAI()">Claudeへのプロンプトをコピー</button></div>
      <div class="copy-hint">コピー後、claude.ai のチャットに貼り付けてください。</div>
    </div>`;
}
// カレンダーピッカー
let pickerMonth=new Date();
function openPicker(){
  const{start}=getRange(period);
  pickerMonth=new Date(start.getFullYear(),start.getMonth(),1);
  renderPicker();
}
function closePicker(){const el=document.getElementById("cal-picker");if(el)el.remove();}
function renderPicker(){
  const existing=document.getElementById("cal-picker");
  if(existing)existing.remove();
  const{start,end}=getRange(period);
  const y=pickerMonth.getFullYear(),m=pickerMonth.getMonth();
  const firstDay=new Date(y,m,1).getDay();// 0=Sun
  const daysInMonth=new Date(y,m+1,0).getDate();
  const today=new Date();today.setHours(0,0,0,0);
  // 月曜始まりオフセット
  const offset=(firstDay===0?6:firstDay-1);
  let cells="";
  // 空白
  for(let i=0;i<offset;i++)cells+=`<div class="cal-day faded"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const dt=new Date(y,m,d);
    const isToday=dt.getTime()===today.getTime();
    const isSel=dt>=start&&dt<=end;
    const isWe=dt.getDay()===0||dt.getDay()===6;
    const cls=["cal-day",isToday?"today":"",isSel?"selected":"",isWe?"weekend":""].filter(Boolean).join(" ");
    cells+=`<button class="${cls}" onclick="pickDate(${y},${m},${d})">${d}</button>`;
  }
  const dows=["月","火","水","木","金","土","日"].map(d=>`<div class="cal-dow">${d}</div>`).join("");
  const html=`<div class="cal-picker" id="cal-picker" onclick="if(event.target===this)closePicker()">
    <div class="cal-box">
      <div class="cal-header">
        <button class="cal-nav" onclick="pickerMonth=new Date(pickerMonth.getFullYear(),pickerMonth.getMonth()-1,1);renderPicker()">&#8249;</button>
        <span class="cal-month-label">${y}年${m+1}月</span>
        <button class="cal-nav" onclick="pickerMonth=new Date(pickerMonth.getFullYear(),pickerMonth.getMonth()+1,1);renderPicker()">&#8250;</button>
      </div>
      <div class="cal-grid">${dows}${cells}</div>
      <button class="cal-close" onclick="closePicker()">閉じる</button>
    </div>
  </div>`;
  document.body.insertAdjacentHTML("beforeend",html);
}
function pickDate(y,m,d){
  const picked=new Date(y,m,d);
  const now=new Date();now.setHours(0,0,0,0);
  if(picked>now){closePicker();return;}// 未来は選択不可
  if(period==="day"){
    customStart=new Date(y,m,d);
    // offsetをリセットして選択日を基準に
    periodOffset=0;
  }else if(period==="week"){
    // 選択日を含む月曜に合わせる
    const dow=picked.getDay();
    const diff=dow===0?6:dow-1;
    const mon=new Date(picked);mon.setDate(picked.getDate()-diff);
    customStart=mon;periodOffset=0;
  }else{
    // 選択日を含む月曜を起点に28日
    const dow=picked.getDay();
    const diff=dow===0?6:dow-1;
    const mon=new Date(picked);mon.setDate(picked.getDate()-diff);
    customStart=mon;periodOffset=0;
  }
  closePicker();
  openDetails={ev:{},tk:{},all:{}};filters={all:{},ev:{},tk:{}};overrides={ev:{},tk:{}};locOpenDetail=null;
  fetchData();
}
function shiftPeriod(dir){
  const{start}=getRange(period);
  // 未来方向チェック
  if(dir===1){
    const now=new Date();now.setHours(23,59,59,999);
    const{end}=getRange(period);
    if(end>=now)return;
  }
  customStart=null;// customStartリセットしてoffsetで動かす
  periodOffset+=dir;
  openDetails={ev:{},tk:{},all:{}};filters={all:{},ev:{},tk:{}};overrides={ev:{},tk:{}};locOpenDetail=null;
  fetchData();
}
function changePeriod(p){period=p;periodOffset=0;customStart=null;openDetails={ev:{},tk:{},all:{}};filters={all:{},ev:{},tk:{}};overrides={ev:{},tk:{}};locOpenDetail=null;fetchData();}
setInterval(()=>{try{if(gapi.client.getToken())fetchData();}catch(e){}},300000);
</script>
