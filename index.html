<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>作業レポートダッシュボード</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a;padding:24px}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:8px}
h1{font-size:20px;font-weight:500}
.header-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.meta{font-size:12px;color:#999}
.tabs{display:flex;gap:4px;border-bottom:1px solid #ddd;margin-bottom:6px}
.tab{padding:8px 20px;border:none;background:transparent;cursor:pointer;font-size:14px;color:#666;border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.active{color:#1a1a1a;font-weight:500;border-bottom-color:#1a1a1a}
.period-label{font-size:12px;color:#999;margin-bottom:16px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:20px}
.card{background:#fff;border-radius:8px;padding:12px 16px;border:1px solid #eee}
.card-label{font-size:12px;color:#888;margin-bottom:4px}
.card-value{font-size:20px;font-weight:500}
.section-title{font-size:15px;font-weight:500;margin:20px 0 8px}
.filter-bar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;background:#fff;border:1px solid #eee;border-radius:8px;padding:10px 14px}
.filter-bar label{display:flex;align-items:center;gap:4px;font-size:12px;color:#555;cursor:pointer;user-select:none}
.filter-bar input{cursor:pointer}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-bottom:8px}
.box{background:#fff;border-radius:12px;padding:16px 20px;border:1px solid #eee}
.box-title{font-size:14px;font-weight:500;margin-bottom:12px}
.bar-row{display:flex;align-items:center;gap:8px;font-size:13px;margin-bottom:8px}
.bar-label{width:90px;text-align:right;color:#666;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;background:#f0f0f0;border-radius:4px;height:18px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px}
.bar-btn{border:none;background:transparent;cursor:pointer;font-size:12px;font-weight:500;color:#1a1a1a;padding:2px 6px;border-radius:4px;white-space:nowrap}
.bar-btn:hover{background:#f0f0f0}
.detail-box{background:#f9f9f9;border:1px solid #eee;border-radius:8px;padding:10px 14px;margin:4px 0 10px 100px;font-size:12px}
.detail-row{display:flex;justify-content:space-between;padding:2px 0;color:#555;gap:8px}
.detail-row span:first-child{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.legend{display:flex;flex-direction:column;gap:5px;font-size:12px}
.legend-item{display:flex;align-items:center;gap:6px}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.ai-box{background:#f9f9f9;border-radius:12px;padding:16px 20px;border:1px solid #eee;margin-top:16px}
.ai-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.ai-title{font-size:14px;font-weight:500}
.ai-text{font-size:13px;color:#555;line-height:1.7}
.copy-hint{font-size:12px;color:#888;margin-top:8px}
button{background:#fff;border:1px solid #ddd;border-radius:6px;padding:6px 14px;cursor:pointer;font-size:13px}
button:hover{background:#f5f5f5}
.loading{text-align:center;padding:48px;color:#888;font-size:14px}
.error{background:#fff0f0;border:1px solid #fcc;color:#c33;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px}
.empty{font-size:13px;color:#aaa;text-align:center;padding:16px 0}
</style>
</head>
<body>
<div id="app"><div class="loading">読み込み中…</div></div>
<script>
const CLIENT_ID="729656531255-stonbhee0o8m10gfbqckf1bp2fump90g.apps.googleusercontent.com";
const SCOPES="https://www.googleapis.com/auth/calendar.readonly";
const COLORS={"PJ":"#378ADD","イベント":"#1D9E75","新卒 1on1":"#D4537E","UM 1on1":"#D85A30","PMP":"#7F77DD","未分類":"#888780","foobar*":"#3B6D11"};
const RULES=[
  {m:t=>/JMB/i.test(t)||/^タスク確認/.test(t),c:"PJ"},
  {m:t=>/Monthly Mixer/i.test(t)||/^CTOs Beer/i.test(t)||/^Designer.*s Creative Circle/i.test(t)||/イベント/.test(t),c:"イベント"},
  {m:t=>/foobar/i.test(t),c:"foobar*"},
  {m:t=>/^Kaho \/ Miu/.test(t)||/^Kaho \/ Emiri/.test(t)||/^Emiri \/ Kaho/.test(t)||/^Miu \/ Kaho/.test(t)||/^Miu\/Kaho/.test(t),c:"新卒 1on1"},
  {m:t=>/^Masanori \/ Kaho/.test(t)||/^Satoshi \/ Kaho/.test(t)||/^\[上期評価FB\]/.test(t),c:"UM 1on1"},
  {m:t=>/^\[FY26\]PMP1[：:].*定例/.test(t)||/^General MTG for PMPs/.test(t),c:"PMP"},
];

let period="week",tokenClient,calData=[],taskData=[],updatedAt="";
let openDetails={ev:{},tk:{},all:{}};
let gapiDone=false,gisDone=false;
let filters={all:{},ev:{},tk:{}};

function categorize(t){for(const r of RULES)if(r.m(t))return r.c;return"未分類";}
function isFlamingo(ev){return ev.colorId==="4";}
function fmtH(h){return h<0.05?"0h":h.toFixed(1)+"h";}
function fmtDate(d){return`${d.getMonth()+1}/${d.getDate()}`;}

function getRange(p){
  const now=new Date();
  if(p==="day"){
    const s=new Date(now);s.setHours(0,0,0,0);
    const e=new Date(now);e.setHours(23,59,59,999);
    return{start:s,end:e};
  }else if(p==="week"){
    const s=new Date(now);s.setDate(now.getDate()-6);s.setHours(0,0,0,0);
    const e=new Date(now);e.setHours(23,59,59,999);
    return{start:s,end:e};
  }else{
    const s=new Date(now);s.setDate(now.getDate()-29);s.setHours(0,0,0,0);
    const e=new Date(now);e.setHours(23,59,59,999);
    return{start:s,end:e};
  }
}

function getPeriodLabel(p){
  const{start,end}=getRange(p);
  if(p==="day")return fmtDate(start);
  return`${fmtDate(start)}〜${fmtDate(end)}`;
}

function tryReady(){
  if(!gapiDone||!gisDone)return;
  document.getElementById("app").innerHTML=`
    <div class="loading">
      <div style="font-size:15px;font-weight:500;margin-bottom:8px">作業レポートダッシュボード</div>
      <div style="font-size:13px;color:#888;margin-bottom:20px">Googleアカウントでログインしてください</div>
      <button onclick="signIn()" style="font-size:14px;padding:10px 28px;font-weight:500;background:#1a73e8;color:#fff;border:none;border-radius:8px;cursor:pointer">Googleでログイン</button>
    </div>`;
}

function gapiInit(){
  gapi.load("client",async()=>{
    await gapi.client.load("https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest");
    gapiDone=true;tryReady();
  });
}

function gisInit(){
  tokenClient=google.accounts.oauth2.initTokenClient({
    client_id:CLIENT_ID,scope:SCOPES,
    callback:(resp)=>{
      if(resp.error){showError("認証エラー: "+resp.error);return;}
      fetchData();
    }
  });
  gisDone=true;tryReady();
}

function signIn(){tokenClient.requestAccessToken({prompt:"consent"});}
function signOut(){
  const t=gapi.client.getToken();
  if(t)google.accounts.oauth2.revoke(t.access_token,()=>{});
  gapi.client.setToken(null);
  calData=[];taskData=[];
  document.getElementById("app").innerHTML=`<div class="loading"><div style="margin-bottom:12px">ログアウトしました</div><button onclick="signIn()" style="font-size:14px;padding:10px 28px;background:#1a73e8;color:#fff;border:none;border-radius:8px;cursor:pointer">再ログイン</button></div>`;
}

function showError(msg){
  let el=document.getElementById("err");
  if(!el){el=document.createElement("div");el.id="err";el.className="error";document.getElementById("app").prepend(el);}
  el.textContent=msg;
}

async function fetchData(){
  try{
    const{start,end}=getRange(period);
    const calRes=await gapi.client.calendar.events.list({
      calendarId:"primary",timeMin:start.toISOString(),timeMax:end.toISOString(),
      singleEvents:true,orderBy:"startTime",maxResults:500
    });
    const items=calRes.result.items||[];
    const myEmail=(await gapi.client.calendar.calendarList.get({calendarId:"primary"})).result.id;

    const catMap={};
    const taskMap={};

    items.forEach(ev=>{
      if(isFlamingo(ev))return;
      // 終日イベント除外
      if(ev.start?.date&&!ev.start?.dateTime)return;
      if(!ev.start?.dateTime||!ev.end?.dateTime)return;
      const dur=(new Date(ev.end.dateTime)-new Date(ev.start.dateTime))/3600000;
      if(dur<=0)return;

      const title=ev.summary||"";
      const desc=ev.description||"";
      const isTask=desc.includes("tasks.google.com/task/");

      // 不在・移動除外（タスク除く）
      if(!isTask&&(/^不在$/.test(title.trim())||/^移動$/.test(title.trim())))return;

      // タスク処理（完了ステータスのみ → statusがcompletedのもの）
      if(isTask){
        // カレンダーに出ているタスクは完了扱いとして集計
        const cat=/^foobar/i.test(title)||desc.includes("foobar")?"foobar*":"PJ";
        if(!taskMap[cat])taskMap[cat]={value:0,count:0,items:[]};
        taskMap[cat].value+=dur;taskMap[cat].count++;
        taskMap[cat].items.push({title,dur});
        return;
      }

      // 参加ステータス確認（複数参加者がいる場合のみ）
      if(ev.attendees&&ev.attendees.length>0){
        const me=ev.attendees.find(a=>a.self||a.email===myEmail);
        if(me){
          const st=me.responseStatus;
          if(st==="declined"||st==="tentative"||st==="needsAction")return;
        }
      }

      const cat=categorize(title);
      if(!catMap[cat])catMap[cat]={value:0,count:0,items:[]};
      catMap[cat].value+=dur;catMap[cat].count++;
      catMap[cat].items.push({title,dur});
    });

    calData=Object.entries(catMap).map(([label,d])=>({label,value:d.value,count:d.count,items:d.items})).sort((a,b)=>b.value-a.value);
    taskData=Object.entries(taskMap).map(([label,d])=>({label,value:d.value,count:d.count,items:d.items})).sort((a,b)=>b.value-a.value);

    // フィルタ初期化（全カテゴリON）
    const allCats=[...new Set([...calData,...taskData].map(d=>d.label))];
    ["all","ev","tk"].forEach(k=>{
      if(!filters[k]||Object.keys(filters[k]).length===0){
        filters[k]={};
        allCats.forEach(c=>{filters[k][c]=true;});
      } else {
        allCats.forEach(c=>{if(filters[k][c]===undefined)filters[k][c]=true;});
      }
    });

    updatedAt=new Date().toLocaleTimeString("ja-JP");
    openDetails={ev:{},tk:{},all:{}};
    render();
  }catch(e){
    showError("データ取得エラー: "+(e.result?.error?.message||e.message||JSON.stringify(e)));
  }
}

function toggleDetail(type,idx){
  openDetails[type][idx]=!openDetails[type][idx];
  render();
}

function toggleFilter(section,cat){
  filters[section][cat]=!filters[section][cat];
  render();
}

function filterData(data,section){
  return data.filter(d=>filters[section][d.label]!==false);
}

function mergeData(evArr,tkArr){
  const map={};
  [...evArr,...tkArr].forEach(d=>{
    if(!map[d.label])map[d.label]={label:d.label,value:0,count:0,items:[]};
    map[d.label].value+=d.value;
    map[d.label].count+=d.count;
    map[d.label].items.push(...d.items);
  });
  return Object.values(map).sort((a,b)=>b.value-a.value);
}

function filterBar(section,allCats){
  return`<div class="filter-bar">${allCats.map(c=>`<label><input type="checkbox" ${filters[section][c]!==false?"checked":""} onchange="toggleFilter('${section}','${c}')">${c}</label>`).join("")}</div>`;
}

function barChart(data,type){
  if(!data.length)return'<div class="empty">データなし</div>';
  const max=Math.max(...data.map(d=>d.value),0.1);
  return data.map((d,i)=>{
    const isOpen=openDetails[type]&&openDetails[type][i];
    const detail=isOpen?`<div class="detail-box">${
      d.items.slice().sort((a,b)=>b.dur-a.dur).map(it=>`<div class="detail-row"><span>${it.title}</span><span style="flex-shrink:0">${fmtH(it.dur)}</span></div>`).join("")
    }</div>`:"";
    return`<div><div class="bar-row">
      <div class="bar-label" title="${d.label}">${d.label}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.max((d.value/max)*100,2).toFixed(1)}%;background:${COLORS[d.label]||"#888"}"></div></div>
      <button class="bar-btn" onclick="toggleDetail('${type}',${i})">${fmtH(d.value)} (${d.count}) ${isOpen?"▲":"▼"}</button>
    </div>${detail}</div>`;
  }).join("");
}

function pieChart(data){
  const total=data.reduce((s,d)=>s+d.value,0);
  if(!total)return'<div class="empty">データなし</div>';
  let cum=-Math.PI/2;
  const paths=data.map(d=>{
    const a=(d.value/total)*2*Math.PI;
    const sx=cum;cum+=a;
    const r=70,cx=80,cy=80;
    const x1=cx+r*Math.cos(sx),y1=cy+r*Math.sin(sx);
    const x2=cx+r*Math.cos(cum),y2=cy+r*Math.sin(cum);
    return`<path d="M${cx},${cy} L${x1.toFixed(1)},${y1.toFixed(1)} A${r},${r},0,${a>Math.PI?1:0},1,${x2.toFixed(1)},${y2.toFixed(1)} Z" fill="${COLORS[d.label]||"#888"}" stroke="#fff" stroke-width="1.5"/>`;
  }).join("");
  const leg=data.map(d=>{
    const pct=total>0?Math.round(d.value/total*100):0;
    return`<div class="legend-item"><div class="legend-dot" style="background:${COLORS[d.label]||"#888"}"></div><span style="color:#666">${d.label}</span><span style="font-weight:500;margin-left:4px">${pct}%（${fmtH(d.value)}）</span></div>`;
  }).join("");
  return`<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap"><svg viewBox="0 0 160 160" width="130" height="130" style="flex-shrink:0">${paths}</svg><div class="legend">${leg}</div></div>`;
}

function section(title,data,type,allCats){
  const filtered=filterData(data,type);
  return`
    <div class="section-title">${title}</div>
    ${filterBar(type,allCats)}
    <div class="grid">
      <div class="box"><div class="box-title">カテゴリ別時間</div>${barChart(filtered,type)}</div>
      <div class="box"><div class="box-title">割合</div>${pieChart(filtered)}</div>
    </div>`;
}

function copyForAI(){
  const labels={day:"1日",week:"直近1週間",month:"直近1ヶ月"};
  const ev=calData.map(d=>`${d.label}:${fmtH(d.value)}(${d.count}件)`).join(", ");
  const tk=taskData.map(d=>`${d.label}:${fmtH(d.value)}(${d.count}件)`).join(", ");
  const text=`${labels[period]}（${getPeriodLabel(period)}）の作業データです。\n予定: ${ev||"なし"}\nタスク: ${tk||"なし"}\n\n上記データをもとに100〜150字で振り返りコメントをください。`;
  navigator.clipboard.writeText(text).then(()=>{
    document.getElementById("copy-btn").textContent="コピーしました！";
    setTimeout(()=>{const b=document.getElementById("copy-btn");if(b)b.textContent="Claudeへのプロンプトをコピー";},2000);
  });
}

function render(){
  const allData=mergeData(calData,taskData);
  const allCats=[...new Set(allData.map(d=>d.label))];
  const totalEv=calData.reduce((s,d)=>s+d.value,0);
  const totalTk=taskData.reduce((s,d)=>s+d.value,0);
  const countEv=calData.reduce((s,d)=>s+d.count,0);
  const countTk=taskData.reduce((s,d)=>s+d.count,0);
  const tabs=["month","week","day"].map(t=>`<button class="tab${period===t?" active":""}" onclick="changePeriod('${t}')">${{month:"1ヶ月",week:"1週間",day:"1日"}[t]}</button>`).join("");

  document.getElementById("app").innerHTML=`
    <div class="header">
      <h1>作業レポート</h1>
      <div class="header-right">
        ${updatedAt?`<span class="meta">${updatedAt} 更新</span>`:""}
        <button onclick="fetchData()">更新</button>
        <button onclick="signOut()" style="opacity:0.6">ログアウト</button>
      </div>
    </div>
    <div class="tabs">${tabs}</div>
    <div class="period-label">${getPeriodLabel(period)}</div>
    <div class="cards">
      <div class="card"><div class="card-label">予定 合計</div><div class="card-value">${fmtH(totalEv)}</div></div>
      <div class="card"><div class="card-label">タスク 合計</div><div class="card-value">${fmtH(totalTk)}</div></div>
      <div class="card"><div class="card-label">予定件数</div><div class="card-value">${countEv}件</div></div>
      <div class="card"><div class="card-label">タスク件数</div><div class="card-value">${countTk}件</div></div>
    </div>
    ${section("合計",allData,"all",allCats)}
    ${section("予定",calData,"ev",allCats)}
    ${section("タスク",taskData,"tk",allCats)}
    <div class="ai-box">
      <div class="ai-header"><div class="ai-title">AI 振り返りコメント</div></div>
      <div class="ai-text">データをコピーしてClaude.aiに貼り付けると振り返りコメントを生成できます。</div>
      <div style="margin-top:10px"><button id="copy-btn" onclick="copyForAI()">Claudeへのプロンプトをコピー</button></div>
      <div class="copy-hint">コピー後、claude.ai のチャットに貼り付けてください。</div>
    </div>`;
}

function changePeriod(p){period=p;openDetails={ev:{},tk:{},all:{}};filters={all:{},ev:{},tk:{}};fetchData();}
setInterval(()=>{try{if(gapi.client.getToken())fetchData();}catch(e){}},300000);
</script>
<script src="https://apis.google.com/js/api.js" onload="gapiInit()"></script>
<script src="https://accounts.google.com/gsi/client" onload="gisInit()"></script>
</body>
</html>
