<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>作業レポートダッシュボード</title>
<script src="https://apis.google.com/js/api.js"></script>
<script src="https://accounts.google.com/gsi/client"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a;padding:24px}
  h1{font-size:20px;font-weight:500;margin-bottom:20px}
  .tabs{display:flex;gap:4px;border-bottom:1px solid #ddd;margin-bottom:20px}
  .tab{padding:8px 20px;border:none;background:transparent;cursor:pointer;font-size:14px;color:#666;border-bottom:2px solid transparent;margin-bottom:-1px}
  .tab.active{color:#1a1a1a;font-weight:500;border-bottom-color:#1a1a1a}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:20px}
  .card{background:#fff;border-radius:8px;padding:12px 16px;border:1px solid #eee}
  .card-label{font-size:12px;color:#888;margin-bottom:4px}
  .card-value{font-size:20px;font-weight:500}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-bottom:16px}
  .box{background:#fff;border-radius:12px;padding:16px 20px;border:1px solid #eee}
  .box-title{font-size:14px;font-weight:500;margin-bottom:12px}
  .bar-row{display:flex;align-items:center;gap:8px;font-size:13px;margin-bottom:8px}
  .bar-label{width:88px;text-align:right;color:#666;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .bar-track{flex:1;background:#f0f0f0;border-radius:4px;height:18px;overflow:hidden}
  .bar-fill{height:100%;border-radius:4px;transition:width 0.4s}
  .bar-val{width:56px;font-weight:500;font-size:12px;flex-shrink:0}
  .legend{display:flex;flex-direction:column;gap:5px;font-size:12px}
  .legend-item{display:flex;align-items:center;gap:6px}
  .legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
  .ai-box{background:#f9f9f9;border-radius:12px;padding:16px 20px;border:1px solid #eee;margin-top:16px}
  .ai-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .ai-title{font-size:14px;font-weight:500}
  .ai-text{font-size:14px;color:#555;line-height:1.7}
  button{background:#fff;border:1px solid #ddd;border-radius:6px;padding:6px 14px;cursor:pointer;font-size:13px}
  button:hover{background:#f5f5f5}
  .login-box{text-align:center;padding:48px 24px}
  .login-title{font-size:16px;font-weight:500;margin-bottom:8px}
  .login-sub{font-size:13px;color:#888;margin-bottom:24px}
  .login-btn{font-size:15px;padding:10px 28px;font-weight:500;background:#1a73e8;color:#fff;border:none;border-radius:8px}
  .login-btn:hover{background:#1558b0}
  .error{background:#fff0f0;border:1px solid #fcc;color:#c33;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px}
  .meta{font-size:12px;color:#999}
  .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:8px}
  .header-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .empty{font-size:13px;color:#aaa;text-align:center;padding:16px 0}
</style>
</head>
<body>
<div id="app">
  <div class="login-box">
    <div class="login-title">作業レポートダッシュボード</div>
    <div class="login-sub">Googleアカウントでログインしてカレンダーデータを読み込みます</div>
    <button class="login-btn" onclick="signIn()">Googleでログイン</button>
  </div>
</div>

<script>
const CLIENT_ID = "729656531255-stonbhee0o8m10gfbqckf1bp2fump90g.apps.googleusercontent.com";
const SCOPES = "https://www.googleapis.com/auth/calendar.readonly https://www.googleapis.com/auth/tasks.readonly";
const CATEGORY_COLORS = {
  "PJ":"#378ADD","イベント":"#1D9E75","新卒 1on1":"#D4537E",
  "UM 1on1":"#D85A30","PMP":"#7F77DD","未分類":"#888780",
  "My Tasks":"#BA7517","foobar":"#3B6D11"
};
const TASK_LIST_NAMES = ["My Tasks","PJ","foobar"];
let period = "week";
let tokenClient;
let eventData = [], taskData = [], lastUpdated = null;

const RULES = [
  {match:t=>/^JMB/i.test(t)||/^タスク確認/.test(t), cat:"PJ"},
  {match:t=>/^foobar/i.test(t)||/^Sun.*Monthly Mixer/i.test(t)||/^CTOs Beer/i.test(t)||/^Designer.*s Creative Circle/i.test(t), cat:"イベント"},
  {match:t=>/^Kaho \/ Miu/.test(t)||/^Kaho \/ Emiri/.test(t), cat:"新卒 1on1"},
  {match:t=>/^Masanori \/ Kaho/.test(t)||/^Satoshi \/ Kaho/.test(t)||/^\[上期評価FB\]/.test(t), cat:"UM 1on1"},
  {match:t=>/^\[FY26\]PMP1：Unit定例/.test(t)||/^General MTG for PMPs/.test(t), cat:"PMP"},
];

function categorize(t){for(const r of RULES)if(r.match(t))return r.cat;return"未分類";}
function isFlamingo(ev){return ev.colorId==="4";}
function fmtH(h){return h<0.05?"0h":h.toFixed(1)+"h";}

function getRange(p){
  const now=new Date();
  if(p==="day"){
    const s=new Date(now);s.setHours(0,0,0,0);
    const e=new Date(now);e.setHours(23,59,59,999);
    return{start:s,end:e};
  }else if(p==="week"){
    const s=new Date(now);s.setDate(now.getDate()-now.getDay());s.setHours(0,0,0,0);
    const e=new Date(s);e.setDate(s.getDate()+6);e.setHours(23,59,59,999);
    return{start:s,end:e};
  }else{
    return{start:new Date(now.getFullYear(),now.getMonth(),1),end:new Date(now.getFullYear(),now.getMonth()+1,0,23,59,59,999)};
  }
}

function gapiInit(){
  gapi.load("client",async()=>{
    await gapi.client.load("https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest");
    await gapi.client.load("https://www.googleapis.com/discovery/v1/apis/tasks/v1/rest");
  });
}

function gisInit(){
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id:CLIENT_ID, scope:SCOPES,
    callback:(resp)=>{
      if(resp.error){showError("認証エラー: "+resp.error);return;}
      fetchData();
    }
  });
}

function signIn(){tokenClient.requestAccessToken({prompt:"consent"});}
function signOut(){
  const t=gapi.client.getToken();
  if(t)google.accounts.oauth2.revoke(t.access_token,()=>{});
  gapi.client.setToken(null);
  eventData=[];taskData=[];lastUpdated=null;
  document.getElementById("app").innerHTML=`<div class="login-box"><div class="login-title">作業レポートダッシュボード</div><div class="login-sub">ログアウトしました</div><button class="login-btn" onclick="signIn()">再ログイン</button></div>`;
}

function showError(msg){
  let el=document.getElementById("err");
  if(!el){el=document.createElement("div");el.id="err";el.className="error";document.getElementById("app").prepend(el);}
  el.textContent=msg;
}

async function fetchData(){
  try{
    const{start,end}=getRange(period);
    const calRes=await gapi.client.calendar.events.list({
      calendarId:"primary",timeMin:start.toISOString(),timeMax:end.toISOString(),
      singleEvents:true,orderBy:"startTime",maxResults:500
    });
    const items=calRes.result.items||[];
    const catMap={};
    items.forEach(ev=>{
      if(isFlamingo(ev))return;
      if(!ev.start?.dateTime||!ev.end?.dateTime)return;
      const dur=(new Date(ev.end.dateTime)-new Date(ev.start.dateTime))/3600000;
      const cat=categorize(ev.summary||"");
      if(!catMap[cat])catMap[cat]={value:0,count:0};
      catMap[cat].value+=dur;catMap[cat].count++;
    });
    eventData=Object.entries(catMap).map(([label,d])=>({label,...d})).sort((a,b)=>b.value-a.value);

    const tlRes=await gapi.client.tasks.tasklists.list({maxResults:20});
    const lists=tlRes.result.items||[];
    const taskMap={};
    for(const list of lists){
      const cat=TASK_LIST_NAMES.find(c=>c==="foobar"?/^foobar/i.test(list.title):list.title===c);
      if(!cat)continue;
      const tRes=await gapi.client.tasks.tasks.list({tasklist:list.id,showCompleted:true,maxResults:200});
      (tRes.result.items||[]).forEach(t=>{
        if(!t.due)return;
        const due=new Date(t.due);
        const{start,end}=getRange(period);
        if(due<start||due>end)return;
        const m=(t.notes||"").match(/(\d+(\.\d+)?)\s*h/i);
        if(!m)return;
        if(!taskMap[cat])taskMap[cat]={value:0};
        taskMap[cat].value+=parseFloat(m[1]);
      });
    }
    taskData=Object.entries(taskMap).map(([label,d])=>({label,...d}));
    lastUpdated=new Date();
    render();
  }catch(e){
    showError("データ取得エラー: "+(e.result?.error?.message||e.message||JSON.stringify(e)));
  }
}

async function genAI(){
  const btn=document.getElementById("ai-btn");
  const out=document.getElementById("ai-out");
  btn.disabled=true;btn.textContent="生成中…";
  const labels={day:"1日",week:"1週間",month:"1ヶ月"};
  const ev=eventData.map(d=>`${d.label}:${d.value.toFixed(1)}h(${d.count||0}件)`).join(", ");
  const tk=taskData.map(d=>`${d.label}:${d.value.toFixed(1)}h`).join(", ");
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,
        messages:[{role:"user",content:`${labels[period]}の作業データです。\n予定:${ev||"なし"}\nタスク:${tk||"なし"}\n\n100〜150字で振り返りコメントを日本語でください。`}]
      })
    });
    const data=await res.json();
    out.textContent=data.content?.map(c=>c.text||"").join("")||"生成できませんでした。";
  }catch{out.textContent="AI コメントの取得に失敗しました。";}
  btn.disabled=false;btn.textContent="再生成";
}

function barChart(data){
  const max=Math.max(...data.map(d=>d.value),0.1);
  return data.map(d=>`
    <div class="bar-row">
      <div class="bar-label" title="${d.label}">${d.label}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.max((d.value/max)*100,2)}%;background:${CATEGORY_COLORS[d.label]||"#888"}"></div></div>
      <div class="bar-val">${fmtH(d.value)}${d.count!=null?` (${d.count})`:""}</div>
    </div>`).join("");
}

function pieChart(data){
  const total=data.reduce((s,d)=>s+d.value,0);
  if(!total)return"";
  let cum=-Math.PI/2;
  const paths=data.map(d=>{
    const a=(d.value/total)*2*Math.PI;
    const s=cum;cum+=a;
    const r=70,cx=80,cy=80;
    const x1=cx+r*Math.cos(s),y1=cy+r*Math.sin(s);
    const x2=cx+r*Math.cos(cum),y2=cy+r*Math.sin(cum);
    return`<path d="M${cx},${cy} L${x1},${y1} A${r},${r},0,${a>Math.PI?1:0},1,${x2},${y2} Z" fill="${CATEGORY_COLORS[d.label]||"#888"}" stroke="#fff" stroke-width="1.5"/>`;
  }).join("");
  return`<svg viewBox="0 0 160 160" width="130" height="130" style="flex-shrink:0">${paths}</svg>`;
}

function render(){
  const totalEv=eventData.reduce((s,d)=>s+d.value,0);
  const totalTask=taskData.reduce((s,d)=>s+d.value,0);
  const top=eventData.length?eventData.reduce((a,b)=>a.value>b.value?a:b):null;
  const totalCount=eventData.reduce((s,d)=>s+(d.count||0),0);
  const tabs=["month","week","day"].map(t=>`<button class="tab${period===t?" active":""}" onclick="changePeriod('${t}')">${{month:"1ヶ月",week:"1週間",day:"1日"}[t]}</button>`).join("");
  const legend=eventData.map(d=>`<div class="legend-item"><div class="legend-dot" style="background:${CATEGORY_COLORS[d.label]||"#888"}"></div><span style="color:#666">${d.label}</span><span style="font-weight:500">${d.count}件</span></div>`).join("");
  const taskSection=taskData.length?`<div class="box"><div class="box-title">タスク — カテゴリ別時間（時間指定あり）</div>${barChart(taskData)}</div>`:"";

  document.getElementById("app").innerHTML=`
    <div class="header">
      <h1>作業レポート</h1>
      <div class="header-right">
        ${lastUpdated?`<span class="meta">${lastUpdated.toLocaleTimeString("ja-JP")} 更新</span>`:""}
        <button onclick="fetchData()">更新</button>
        <button onclick="signOut()" style="opacity:0.6">ログアウト</button>
      </div>
    </div>
    <div class="tabs">${tabs}</div>
    <div class="cards">
      <div class="card"><div class="card-label">予定 合計時間</div><div class="card-value">${fmtH(totalEv)}</div></div>
      <div class="card"><div class="card-label">最多カテゴリ</div><div class="card-value">${top?top.label:"-"}</div></div>
      <div class="card"><div class="card-label">イベント件数</div><div class="card-value">${totalCount}件</div></div>
      <div class="card"><div class="card-label">タスク時間</div><div class="card-value">${fmtH(totalTask)}</div></div>
    </div>
    <div class="grid">
      <div class="box">
        <div class="box-title">予定 — カテゴリ別時間</div>
        ${eventData.length?barChart(eventData):`<div class="empty">データなし</div>`}
      </div>
      <div class="box">
        <div class="box-title">割合</div>
        <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
          ${pieChart(eventData)}
          <div class="legend">${legend}</div>
        </div>
      </div>
    </div>
    ${taskSection}
    <div class="ai-box">
      <div class="ai-header">
        <div class="ai-title">AI 振り返りコメント</div>
        <button id="ai-btn" onclick="genAI()">生成</button>
      </div>
      <div id="ai-out" class="ai-text">「生成」ボタンを押すと振り返りコメントが表示されます。</div>
    </div>`;
}

function changePeriod(p){period=p;fetchData();}

window.onload=()=>{gapiInit();gisInit();};
setInterval(()=>{if(gapi.client.getToken())fetchData();},300000);
</script>
</body>
</html>
